<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Padea — Sign in</title>
  <style>
    :root {
      --bg: #0f1115; --panel: #181b22; --panel2: #1f232c; --line: #2a2f3a;
      --ink: #e8eaed; --dim: #9aa3b2; --accent: #5b8cff; --bad: #ff6b6b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--ink); min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .card {
      background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
      padding: 28px 26px; width: 320px;
    }
    h1 { margin: 0 0 2px; font-size: 18px; }
    .sub { color: var(--dim); font-size: 12px; margin-bottom: 18px; }
    label { display: block; color: var(--dim); font-size: 12px; margin: 10px 0 3px; }
    input {
      background: var(--panel2); border: 1px solid var(--line); color: var(--ink);
      border-radius: 6px; padding: 8px 10px; font: inherit; width: 100%;
    }
    button {
      margin-top: 18px; width: 100%; background: var(--accent); color: #fff;
      border: 0; border-radius: 6px; padding: 9px 12px; font: inherit;
      font-weight: 600; cursor: pointer;
    }
    .flash {
      padding: 9px 12px; border-radius: 8px; margin-bottom: 12px; font-size: 13px;
      background: #2a1414; border: 1px solid #5f1f1f; color: #ffc0c0;
    }
  </style>
</head>
<body>
  <form class="card" method="post" action="{{ url_for('login', next=request.args.get('next', '')) }}">
    <h1>Padea Cockpit</h1>
    <div class="sub">Operator sign-in</div>
    {% with messages = get_flashed_messages() %}
      {% if messages %}{% for message in messages %}
        <div class="flash">{{ message }}</div>
      {% endfor %}{% endif %}
    {% endwith %}
    <label for="username">Username</label>
    <input id="username" name="username" autocomplete="username" autofocus>
    <label for="password">Password</label>
    <input id="password" name="password" type="password" autocomplete="current-password">
    <button type="submit">Sign in</button>
  </form>
</body>
</html>
