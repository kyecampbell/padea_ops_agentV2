<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Padea — Sign in</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='apple-touch-icon.png') }}">
  <style>
    :root {
      --maroon: #7A1F2B; --maroon-dark: #5e1722; --maroon-tint: #f7ecee;
      --bg: #f6f7f9; --panel: #ffffff; --line: #e4e6ea;
      --ink: #1c1d22; --dim: #6b7280; --bad: #c0392b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--ink); min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .card {
      background: var(--panel); border: 1px solid var(--line); border-radius: 14px;
      width: 340px; overflow: hidden; box-shadow: 0 10px 30px rgba(16,17,22,.10);
    }
    /* Maroon header band holds the WHITE wordmark + tagline. */
    .card-head {
      background: var(--maroon); color: #fff; padding: 26px 26px 22px; text-align: center;
    }
    .card-head img { height: 38px; width: auto; display: block; margin: 0 auto; }
    .card-head .tagline {
      color: rgba(255,255,255,.85); font-size: 12px; margin-top: 10px;
      letter-spacing: .02em;
    }
    .card-body { padding: 22px 26px 26px; }
    .card-body .sub { color: var(--dim); font-size: 12px; margin-bottom: 14px; text-align: center; }
    label { display: block; color: var(--dim); font-size: 12px; margin: 10px 0 3px; }
    input {
      background: #fff; border: 1px solid var(--line); color: var(--ink);
      border-radius: 6px; padding: 8px 10px; font: inherit; width: 100%;
    }
    input:focus { outline: none; border-color: var(--maroon); box-shadow: 0 0 0 2px var(--maroon-tint); }
    button {
      margin-top: 18px; width: 100%; background: var(--maroon); color: #fff;
      border: 0; border-radius: 6px; padding: 10px 12px; font: inherit;
      font-weight: 600; cursor: pointer;
    }
    button:hover { background: var(--maroon-dark); }
    .flash {
      padding: 9px 12px; border-radius: 8px; margin-bottom: 12px; font-size: 13px;
      background: #fdecec; border: 1px solid #f3c2c2; color: #9b1c12;
    }
  </style>
</head>
<body>
  <form class="card" method="post" action="{{ url_for('login', next=request.args.get('next', '')) }}">
    <div class="card-head">
      <img src="{{ url_for('static', filename='padea-logo.webp') }}" alt="Padea">
      <div class="tagline">Structure and Support Study</div>
    </div>
    <div class="card-body">
      <div class="sub">Operator sign-in</div>
      {% with messages = get_flashed_messages() %}
        {% if messages %}{% for message in messages %}
          <div class="flash">{{ message }}</div>
        {% endfor %}{% endif %}
      {% endwith %}
      <label for="username">Username</label>
      <input id="username" name="username" autocomplete="username" autofocus>
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password">
      <button type="submit">Sign in</button>
    </div>
  </form>
</body>
</html>
